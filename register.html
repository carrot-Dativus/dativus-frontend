<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dativus - 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        /* 헤더 스타일 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-text { font-size: 20px; font-weight: 700; color: #000; }
        .top-nav { display: flex; align-items: center; gap: 15px; }
        .top-nav span { font-size: 14px; color: #707070; cursor: pointer; }
        .btn-top-login { background: #000; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 500; }

        /* 메인 영역 */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 400px;
        }

        .register-title { font-size: 34px; font-weight: 700; color: #000; margin-bottom: 40px; }

        /* 폼 스타일 */
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; color: #000; margin-bottom: 8px; }
        .input-group input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #c0c0c0; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        
        .btn-submit-register { 
            width: 100%; 
            padding: 16px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 6px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 10px; 
        }

        .error-message { color: #ff3b3b; font-size: 12px; margin-bottom: 12px; }

        @media (max-width: 480px) {
            .header { padding: 15px 20px; }
            .register-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-text">Dativus</div>
        <div class="top-nav">
            <span style="cursor:pointer;" onclick="location.href='/api/v1/users/register'">회원가입</span>
            
            <button class="btn-top-login" onclick="location.href='/api/v1/auth/login'">로그인</button>
        </div>
    </header>

    <main class="main-content">
        <div class="register-container">
            <h1 class="register-title">Datvius</h1>
            
            <form action="/api/v1/users/register" method="post">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" name="email" required>
                </div>
                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" name="password" required>
                </div>
                <div class="input-group">
                    <label>PASSWORD-CHECK</label>
                    <input type="password" name="passwordCheck" required>
                </div>
                <div class="input-group">
                    <label>NAME</label>
                    <input type="text" name="username" required>
                </div>
                
                <div th:if="${error}" class="error-message" th:text="${error}"></div>
                
                <button type="submit" class="btn-submit-register">가입하기</button>
            </form>
        </div>
    </main>

</body>
</html>
