<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dativus - 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 1. 기본 페이지 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            background-color: #ffffff;
            color: #000;
        }

        /* 2. 상단 헤더 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }
        .logo-text { font-size: 20px; font-weight: 700; cursor: pointer; }
        .top-nav { display: flex; align-items: center; gap: 15px; }
        .top-nav span { font-size: 15px; color: #707070; cursor: pointer; }
        .btn-top-login { background: #000; color: #fff; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: 500; }

        /* 3. 메인 타이틀 */
        .page-title-container {
            text-align: center;
            padding: 50px 0 70px 0;
        }
        .page-title {
            font-size: 38px; 
            letter-spacing: 10px;
            font-weight: 700;
            margin: 0;
        }

        /* 4. 전체 레이아웃 뼈대 */
        .layout-grid {
            display: grid;
            grid-template-columns: 220px 1fr; 
            width: 100%; 
            margin: 0; 
        }

        /* 5. 좌측 메뉴 셀 (현재 위치 고정) */
        .sidebar-cell {
            border-right: 3px solid #dbdbdb; 
            padding: 20px 20px 60px 40px; 
            display: flex;
            justify-content: flex-start; 
            align-items: flex-start;
        }
        .sidebar-title {
            font-size: 18px; 
            font-weight: 700;
            color: #888;
            text-decoration: underline;
            text-decoration-color: #ccc;
            text-underline-offset: 8px; 
            text-decoration-thickness: 2px;
            margin: 0;
            white-space: nowrap;
        }
        .sidebar-title.active {
            color: #000;
            font-size: 20px;
        }

        /* 6. 우측 내용 셀 (💡 요청하신 부분: 왼쪽 여백을 대폭 늘림) */
        .content-cell {
            /* 기존 150px -> 280px로 변경하여 오른쪽으로 확 밀어냄 */
            padding: 20px 0 60px 280px; 
        }

        /* 7. 사용자 정보 변경 영역 */
        .profile-section {
            display: flex;
            align-items: flex-start;
            gap: 80px; 
        }
        
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .profile-img {
            width: 120px; 
            height: 120px;
            border-radius: 50%;
            background-color: #e3f2fd;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .profile-img img { width: 100%; height: auto; }
        .profile-name { font-weight: 700; font-size: 17px; }
        
        .btn-grey {
            background-color: #dfdfdf;
            border: 1px solid #b0b0b0;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: #333;
        }

        .account-info {
            display: flex;
            flex-direction: column;
            gap: 18px; 
            margin-top: 20px;
            width: 100%; 
            max-width: 500px; 
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .input-row label { font-weight: 700; width: 70px; font-size: 17px; }
        .input-row input {
            flex: 1; 
            padding: 10px 12px;
            border: 1px solid #888;
            border-radius: 2px;
            font-size: 15px;
        }
        .button-row {
            display: flex;
            gap: 12px;
            padding-left: 85px; 
        }

        /* 8. 개인 성향 설정 (체크박스) 영역 */
        .traits-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 25px 30px; 
            max-width: 900px; 
            margin-bottom: 40px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px; 
            cursor: pointer;
        }
        .checkbox-item input[type="checkbox"] {
            width: 20px; 
            height: 20px;
            cursor: pointer;
            margin: 0;
            accent-color: #000;
        }

        /* 9. 기타 텍스트 입력 영역 */
        .etc-section {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .etc-section label { font-weight: 700; margin-top: 5px; font-size: 17px;}
        .etc-section textarea {
            flex: 1; 
            max-width: 900px;
            height: 150px;
            padding: 15px;
            border: 1px solid #888;
            border-radius: 2px;
            resize: none;
            font-family: inherit;
            font-size: 16px;
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo-text" onclick="location.href='/'">Dativus</div>
        <div class="top-nav">
            <span onclick="location.href='/api/v1/users/register'">회원가입</span>
            <button class="btn-top-login" onclick="location.href='/api/v1/auth/login'">로그인</button>
        </div>
    </header>

    <div class="page-title-container">
        <h1 class="page-title">마 이 페 이 지</h1>
    </div>

    <div class="layout-grid">
        
        <div class="sidebar-cell" style="padding-bottom: 30px;">
            <div class="sidebar-title active">마 이 페 이 지</div>
        </div>
        <div class="content-cell" style="padding-bottom: 30px;"></div>

        <div class="sidebar-cell" style="padding-bottom: 80px;">
            <div class="sidebar-title">사용자 정보 변경</div>
        </div>
        <div class="content-cell" style="padding-bottom: 80px;">
            <div class="profile-section">
                <div class="profile-card">
                    <div class="profile-img">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="프로필">
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="profile-name">홍길동</span>
                        <button class="btn-grey">변경</button>
                    </div>
                </div>

                <div class="account-info">
                    <div class="input-row">
                        <label>E-mail:</label>
                        <input type="email" value="123456@gmail.com" readonly>
                    </div>
                    <div class="button-row">
                        <button class="btn-grey">이메일 변경</button>
                        <button class="btn-grey">비밀번호 변경</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-cell" style="padding-bottom: 80px;">
            <div class="sidebar-title">개인 성향 설정</div>
        </div>
        <div class="content-cell" style="padding-bottom: 80px;">
            <div class="traits-grid">
                <label class="checkbox-item"><input type="checkbox" name="trait" value="이성적인"> 이성적인</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="신중한"> 신중한</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="배려심 있는"> 배려심 있는</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="긍정적인"> 긍정적인</label>
                
                <label class="checkbox-item"><input type="checkbox" name="trait" value="논리적인"> 논리적인</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="친근한"> 친근한</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="유연한"> 유연한</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="도전적인"> 도전적인</label>
                
                <label class="checkbox-item"><input type="checkbox" name="trait" value="분석적인"> 분석적인</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="사교적인"> 사교적인</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="꼼꼼한"> 꼼꼼한</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="문제 해결 중심"> 문제 해결 중심</label>
                
                <label class="checkbox-item"><input type="checkbox" name="trait" value="객관적인"> 객관적인</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="밝은"> 밝은</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="성실한"> 성실한</label>
                <label class="checkbox-item"><input type="checkbox" name="trait" value="자기주도적인"> 자기주도적인</label>
            </div>

            <div class="etc-section">
                <label>기타:</label>
                <textarea placeholder="이 외에 필요한 성향은 이곳에 작성 해주세요."></textarea>
            </div>
        </div>

        <div class="sidebar-cell" style="border-bottom: none;">
            <div class="sidebar-title">결제 정보 설정</div>
        </div>
        <div class="content-cell"></div>

    </div>

</body>
</html>
