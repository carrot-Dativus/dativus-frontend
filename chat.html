<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dativus - 채팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 1. 기본 페이지 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            background-color: #ffffff;
            color: #000;
            height: 100vh; /* 화면 스크롤 방지를 위해 100vh 고정 */
            display: flex;
            flex-direction: column;
        }

        /* 2. 상단 헤더 (마이페이지와 동일) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            flex-shrink: 0; 
        }
        .logo-text { font-size: 20px; font-weight: 700; cursor: pointer; }
        .top-nav { display: flex; align-items: center; gap: 15px; }
        .top-nav span { font-size: 15px; color: #707070; cursor: pointer; }
        .btn-top-login { background: #000; color: #fff; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: 500; }

        /* 3. 전체 레이아웃 뼈대 (💡 마이페이지와 완벽히 동일한 수치 적용) */
        .layout-grid {
            display: grid;
            grid-template-columns: 220px 1fr; /* 마이페이지와 동일한 220px */
            width: 100%; 
            margin: 0; /* 여백 제거 */
            flex: 1; 
            overflow: hidden; 
        }

        /* 4. 좌측 메뉴 셀 (💡 마이페이지와 패딩, 정렬 완벽 동기화) */
        .sidebar-cell {
            border-right: 3px solid #dbdbdb; 
            padding: 20px 20px 60px 40px; /* 마이페이지와 동일한 패딩 */
            display: flex;
            flex-direction: column; /* 여러 메뉴가 세로로 쌓이도록 설정 */
            align-items: flex-start;
        }
        
        .sidebar-title {
            font-size: 18px; 
            font-weight: 700;
            color: #888;
            text-decoration: underline;
            text-decoration-color: #ccc;
            text-underline-offset: 8px; 
            text-decoration-thickness: 2px;
            margin: 0 0 40px 0; /* 메뉴들 사이의 간격 */
            cursor: pointer;
            white-space: nowrap;
        }
        .sidebar-title.active {
            color: #000;
            font-size: 20px;
        }

        /* 5. 우측 채팅 콘텐츠 셀 */
        .content-cell {
            display: flex;
            flex-direction: column;
            padding: 20px 80px 40px 80px; /* 채팅창이 너무 선에 붙지 않게 여백 추가 */
            height: 100%;
            box-sizing: border-box;
        }

        /* 6. 대화 기록이 표시될 빈 공간 */
        .chat-history {
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 0;
        }

        /* 7. 하단 채팅 입력바 */
        .input-bar {
            display: flex;
            align-items: center;
            background-color: #f2f2f2;
            border: 2px solid #b0b0b0;
            border-radius: 40px; 
            padding: 12px 20px;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-plus {
            background: none;
            border: none;
            font-size: 32px;
            color: #888;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .btn-send {
            background: none;
            border: 2px solid #000;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            padding: 0;
            padding-bottom: 2px; 
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo-text" onclick="location.href='/'">Dativus</div>
        <div class="top-nav">
            <span onclick="location.href='/api/v1/users/register'">회원가입</span>
            <button class="btn-top-login" onclick="location.href='/api/v1/auth/login'">로그인</button>
        </div>
    </header>

    <div class="layout-grid">
        
        <div class="sidebar-cell">
            <div class="sidebar-title active">새 채팅방</div>
            </div>

        <div class="content-cell">
            
            <div class="chat-history">
                </div>

            <div class="input-bar">
                <button class="btn-plus">+</button>
                <input type="text" class="chat-input" placeholder="">
                <button class="btn-send">&#8593;</button>
            </div>

        </div>

    </div>

</body>
</html>
